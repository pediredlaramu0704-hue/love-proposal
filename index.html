<!DOCTYPE html>
<html>
<head>
<title>My Love Proposal ❤️</title>
<style>
body{
  text-align:center;
  background:#ffe6f0;
  font-family:Arial;
  padding-top:100px;
}
button{
  padding:10px 20px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
#yes{
  background:green;
  color:white;
}
#no{
  background:red;
  color:white;
  position:absolute;
}
</style>
</head>
<body>
  
<h1>Hi Krushitha</h1>
  <img src="Photo.jpg" width="250" style="border-radius:20px; margin-top:20px;">
<p>You make my life beautiful every single day.</p>
<h2>Will you be mine forever? 💍</h2>

<button id="yes" onclick="accepted()">Yes 💖</button>
<button id="no" onmouseover="moveButton()">No 😜</button>

<script>
function accepted(){
  document.body.innerHTML = "<h1>Really! 🎉❤️</h1><h2>I Love You Forever 💕</h2>";
}

function moveButton(){
  var x = Math.random()*window.innerWidth;
  var y = Math.random()*window.innerHeight;
  var btn = document.getElementById("no");
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
